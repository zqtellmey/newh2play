name: Renew Bot
on:
  workflow_dispatch:      # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with: {python-version: '3.10'}
        
      - name: Install dependencies
        run: |
          sudo apt-get update
          # 注意这里将 libasound2 修改为了 libasound2t64
          sudo apt-get install -y xvfb libx11-6 libxkbfile1 libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64
          pip install -r requirements.txt
          playwright install chromium
          pip install PySocks
          
      - name: 安装并启动代理 (全自动适配内核)
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          if [ -z "$PROXY_NODE" ]; then
            echo "[INFO] 未配置代理，尝试直连模式..."
            exit 0
          fi
          
          # 1. 下载并安装最新的 Sing-box 核心
          TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION=${TAG#v}
          wget -q "https://github.com/SagerNet/sing-box/releases/download/${TAG}/sing-box-${VERSION}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${VERSION}-linux-amd64.tar.gz"
          mv "sing-box-${VERSION}-linux-amd64/sing-box" . && chmod +x sing-box
          
          # 2. 自动化协议解析脚本 (核心逻辑)
          python3 << 'PYEOF'
          import os, json, base64
          from urllib.parse import urlparse, parse_qs, unquote

          def generate_singbox_config():
              url = os.environ.get("PROXY_NODE", "").strip()
              p = urlparse(url)
              scheme = p.scheme.lower()
              params = {k: v[0] for k, v in parse_qs(p.query).items()}
              
              config = {
                  "log": {"level": "info"},
                  # 1. 强制 DNS 走代理，防止 DNS 泄露导致的 Cloudflare 封锁
                  "dns": {
                      "servers": [{"tag": "dns-proxy", "address": "https://1.1.1.1/dns-query", "detour": "proxy"}],
                      "rules": [{"outbound": "any", "server": "dns-proxy"}]
                  },
                  "inbounds": [{"type": "socks", "tag": "socks-in", "listen": "127.0.0.1", "listen_port": 10808}],
                  "outbounds": []
              }
              
              raw_auth = unquote(p.netloc.split('@')[0] if '@' in p.netloc else "")
              server = p.hostname
              port = int(p.port or 443)
              sni = params.get("sni", server)

              outbound = {
                  "tag": "proxy", "server": server, "server_port": port,
                  # 2. 核心改进：添加指纹模拟，让 Cloudflare 认为你是一个真实的 Chrome 浏览器
                  "tls": {"enabled": True, "server_name": sni, "insecure": True, "utls": {"enabled": True, "fingerprint": "chrome"}}
              }

              if scheme == "vless":
                  outbound.update({"type": "vless", "uuid": raw_auth or p.username, "packet_encoding": "xudp"})
                  if params.get("type") == "ws":
                      outbound["transport"] = {"type": "ws", "path": unquote(params.get("path", "/")), "headers": {"Host": sni}}
                  if params.get("security") == "reality":
                      outbound["tls"]["reality"] = {"enabled": True, "public_key": params.get("pbk", ""), "short_id": params.get("sid", "")}

              elif scheme == "tuic":
                  u, pwd = raw_auth.split(':', 1) if ':' in raw_auth else (raw_auth, "")
                  outbound.update({"type": "tuic", "uuid": u, "password": pwd, "congestion_control": params.get("congestion_control", "cubic"), "tls": {"enabled": True, "server_name": sni, "alpn": ["h3"], "insecure": True}})

              elif scheme in ["hysteria2", "hy2"]:
                  outbound.update({"type": "hysteria2", "password": raw_auth})

              config["outbounds"].append(outbound)
              config["outbounds"].append({"type": "direct", "tag": "direct"})
              return config

          with open("config.json", "w") as f:
              json.dump(generate_singbox_config(), f, indent=2)
          PYEOF
          
          # 3. 后台运行并等待握手
          ./sing-box run -c config.json > proxy.log 2>&1 &
          echo "[INFO] 正在等待代理建立连接 (15秒)..."
          sleep 15
          
          # 4. 连通性最终验证
          if curl -x socks5://127.0.0.1:10808 -s --max-time 15 https://www.google.com > /dev/null; then
            echo "[INFO] ✅ 代理适配成功！当前协议: $(jq -r '.outbounds[0].type' config.json | tr '[:lower:]' '[:upper:]')"
            echo "PROXY_SOCKS5=socks5://127.0.0.1:10808" >> $GITHUB_ENV
          else
            echo "[ERROR] ❌ 代理连接失败。脱敏配置预览如下："
            jq 'del(.outbounds[0].uuid, .outbounds[0].password)' config.json
            echo "--- 错误日志预览 ---"
            cat proxy.log
            exit 1
          fi
          
      - name: Run script
            #  rm -rf .chrome_profile
        env:
          NOPECHA_API_KEY: ${{ secrets.NOPECHA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      #    http_proxy: http://127.0.0.1:10808
      #    https_proxy: http://127.0.0.1:10808
      #    all_proxy: socks5://127.0.0.1:10808
        # 使用 xvfb-run 启动，它会创建一个虚拟的显示环境，彻底解决 Missing X server 问题        
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python -u main.py
